<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorFit — 나만의 코디를 찾아보세요</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#0D0B09;color:#F0EDE8;
  min-height:100vh;display:flex;justify-content:center;align-items:center;
  padding:16px;
}
.card{
  width:100%;max-width:400px;
  background:rgba(26,23,20,0.95);border-radius:24px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
}

/* Hero */
.hero{
  padding:44px 28px 36px;text-align:center;position:relative;
  background:linear-gradient(180deg,rgba(150,79,76,0.12) 0%,transparent 100%);
}
.hero::before{
  content:"";position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,rgba(150,79,76,0.18) 0%,transparent 70%);
  pointer-events:none;
}
.logo{font-size:38px;font-weight:900;color:#C4726F;letter-spacing:-1px;position:relative}
.hero-title{
  font-size:22px;font-weight:700;color:rgba(240,237,232,0.95);
  margin-top:20px;line-height:1.5;
}
.hero-title em{font-style:normal;color:#C4726F}
.hero-desc{
  font-size:13px;color:rgba(255,255,255,0.4);margin-top:10px;line-height:1.7;
}

/* Value props */
.values{
  display:flex;justify-content:center;gap:8px;margin-top:24px;flex-wrap:wrap;
}
.val{
  font-size:11px;font-weight:500;color:rgba(255,255,255,0.5);
  padding:6px 14px;border-radius:20px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
}
.val span{margin-right:4px}

/* CTA */
.cta-section{padding:0 24px 28px;position:relative;z-index:1}
.cta-box{
  display:block;text-align:center;text-decoration:none;
  padding:20px;border-radius:16px;
  background:linear-gradient(135deg,#964F4C 0%,#C4726F 100%);
  color:#fff;font-size:18px;font-weight:700;
  box-shadow:0 6px 24px rgba(150,79,76,0.35);
  transition:transform 0.15s,box-shadow 0.15s;
}
.cta-box:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(150,79,76,0.45)}
.cta-box:active{transform:scale(0.98)}
.cta-sub{font-size:11px;font-weight:400;opacity:0.7;margin-top:5px}

/* How it works */
.how{padding:0 24px 24px}
.how-label{
  font-size:10px;font-weight:600;color:rgba(255,255,255,0.25);
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;text-align:center;
}
.flow{
  display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;
}
.flow-step{
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.flow-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
}
.flow-text{font-size:9px;color:rgba(255,255,255,0.3);text-align:center;max-width:56px;line-height:1.3}
.flow-arrow{font-size:12px;color:rgba(255,255,255,0.1);margin:0 2px}

/* Trust */
.trust{
  margin:0 24px 24px;padding:14px 16px;border-radius:14px;
  background:rgba(107,127,94,0.06);border:1px solid rgba(107,127,94,0.12);
  display:flex;align-items:center;gap:10px;
}
.trust-icon{font-size:18px;flex-shrink:0}
.trust-text{font-size:11px;color:rgba(255,255,255,0.4);line-height:1.5}
.trust-text b{color:rgba(140,180,130,0.8);font-weight:600}

/* Footer */
.footer{
  padding:16px 24px;text-align:center;
  border-top:1px solid rgba(255,255,255,0.04);
}
.footer-text{font-size:10px;color:rgba(255,255,255,0.18);line-height:1.6}

/* Glow */
.glow{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:300px;height:2px;
  background:linear-gradient(90deg,transparent,rgba(150,79,76,0.4),transparent);
}
</style>
</head>
<body>

<div class="card">
  <!-- Hero: 무엇인지 + 왜 써야 하는지 -->
  <div class="hero">
    <div class="logo">ColorFit</div>
    <div class="hero-title">퍼스널컬러에 맞는<br><em>내 코디</em>를 찾아보세요</div>
    <div class="hero-desc">AI가 상황에 딱 맞는 코디 1벌을<br>이유와 함께 골라드립니다</div>
    <div class="values">
      <div class="val"><span>⏱</span>1분 완료</div>
      <div class="val"><span>🎯</span>1벌만 추천</div>
      <div class="val"><span>💬</span>이유 설명</div>
    </div>
    <div class="glow"></div>
  </div>

  <!-- CTA: 바로 시작 -->
  <div class="cta-section">
    <a href="https://frontend-msunkang70-1055s-projects.vercel.app" target="_blank" class="cta-box">
      내 코디 찾으러 가기 →
      <div class="cta-sub">회원가입 없이 바로 시작</div>
    </a>
  </div>

  <!-- How: 간단한 흐름 -->
  <div class="how">
    <div class="how-label">이렇게 진행돼요</div>
    <div class="flow">
      <div class="flow-step">
        <div class="flow-icon">👤</div>
        <div class="flow-text">성별<br>선택</div>
      </div>
      <span class="flow-arrow">→</span>
      <div class="flow-step">
        <div class="flow-icon">🎨</div>
        <div class="flow-text">퍼스널<br>컬러</div>
      </div>
      <span class="flow-arrow">→</span>
      <div class="flow-step">
        <div class="flow-icon">📍</div>
        <div class="flow-text">상황<br>선택</div>
      </div>
      <span class="flow-arrow">→</span>
      <div class="flow-step">
        <div class="flow-icon">💰</div>
        <div class="flow-text">예산<br>설정</div>
      </div>
      <span class="flow-arrow">→</span>
      <div class="flow-step">
        <div class="flow-icon" style="background:rgba(150,79,76,0.12);border-color:rgba(150,79,76,0.25)">👗</div>
        <div class="flow-text" style="color:#C4726F;font-weight:600">코디<br>추천!</div>
      </div>
    </div>
  </div>

  <!-- Trust signal -->
  <div class="trust">
    <div class="trust-icon">🔒</div>
    <div class="trust-text"><b>개인정보 수집 없음</b> — 회원가입·로그인 없이 바로 사용할 수 있어요. 사용 데이터는 서비스 개선에만 활용됩니다.</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-text">ColorFit 사용자 테스트 · 2026.04</div>
  </div>
</div>

</body>
</html>
