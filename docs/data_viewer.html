<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorFit QA Simulator</title>
<script src="outfits_data.js"></script>
<style>
:root{--bg:#F8F6F3;--sf:#F0EDE8;--ac:#964F4C;--bd:#E5E1DA;--tx:#222;--t2:#8C8578;--t3:#B5AFA6;--ok:#6B7F5E;--wn:#A07830}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;max-width:960px;margin:0 auto}

/* header */
.hd{position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:2px solid var(--ac);padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.hd h1{font-family:'Nanum Myeongjo',serif;font-size:20px;color:var(--ac)}
.hd .tag{font-size:9px;background:var(--ac);color:#fff;padding:2px 7px;border-radius:8px;margin-left:6px}
.hd .sub{font-size:11px;color:var(--t3)}
.hd .mode-btn{font-size:11px;padding:4px 12px;border-radius:8px;border:1px solid var(--ac);color:var(--ac);background:none;cursor:pointer}
.hd .mode-btn.on{background:var(--ac);color:#fff}

/* wizard */
.wiz{background:#fff;border-bottom:1px solid var(--bd)}
.step{padding:14px 20px;border-bottom:1px solid var(--bd);display:none}
.step.vis{display:block}
.step-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--bd);color:var(--t2);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.step.done .step-num{background:var(--ac);color:#fff}
.step.cur .step-num{background:var(--ac);color:#fff;box-shadow:0 0 0 3px rgba(150,79,76,.2)}
.step-title{font-size:13px;font-weight:600;color:var(--tx)}
.step-val{font-size:11px;color:var(--ac);margin-left:auto;font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.ch{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:500;border:1.5px solid var(--bd);background:#fff;color:var(--tx);cursor:pointer;transition:all .12s}
.ch:hover{border-color:var(--ac);background:#FBF8F7}
.ch.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.slider-w{display:flex;align-items:center;gap:8px;margin-top:4px}
.slider-w input{flex:1;accent-color:var(--ac)}
.slider-w span{font-size:11px;color:var(--t2);min-width:50px;text-align:right}

/* nav */
.nav{display:flex;gap:8px;padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--bd)}
.nav button{flex:1;padding:8px;border-radius:10px;font-size:13px;font-weight:600;border:none;cursor:pointer}
.nav .prev{background:var(--sf);color:var(--tx)}
.nav .next{background:var(--ac);color:#fff}
.nav .next:disabled{background:var(--bd);color:var(--t3);cursor:default}
.nav .see{background:var(--ac);color:#fff}

/* state */
.state{padding:6px 20px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;flex-wrap:wrap;gap:4px;font-size:10px}
.sp{padding:2px 7px;border-radius:8px;background:var(--ac);color:#fff}

/* result */
.rbar{padding:8px 20px;font-size:12px;color:var(--t2);background:#fff;border-bottom:1px solid var(--bd)}
.rbar b{color:var(--tx)}.rbar .wn{color:var(--wn)}

/* compare */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px}
.compare .col-head{font-size:12px;font-weight:700;color:var(--ac);margin-bottom:6px;text-align:center}

/* cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;padding:14px 20px}
.cd{border:1px solid var(--bd);border-radius:10px;overflow:hidden;background:#fff}
.cd-img{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:var(--sf)}
.cd-b{padding:8px 10px}
.pills{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.pl{font-size:8px;padding:1px 5px;border-radius:6px;font-weight:500}
.pl-t{background:var(--ac);color:#fff}.pl-g{background:#4F97A3;color:#fff}.pl-n{background:#A07830;color:#fff}
.pl-s{background:#6B5B8A;color:#fff}.pl-m{background:#E8DFF0;color:#6B5B8A}.pl-f{background:#D4EDDA;color:#155724}
.pl-p{background:var(--sf);color:var(--tx)}.pl-fm{background:var(--sf);color:var(--t2)}
.cd-sc{font-size:10px;color:var(--t2);margin:3px 0}.cd-sc b{color:var(--ac)}
.cd-items{display:flex;gap:4px;margin-top:4px;overflow-x:auto}
.cd-it{flex-shrink:0;width:48px;text-align:center}
.cd-it img{width:40px;height:40px;border-radius:5px;object-fit:cover;border:1px solid var(--bd)}
.cd-it span{font-size:8px;color:var(--t2);display:block}
.qa{margin-top:6px;padding:6px 8px;background:var(--sf);border-radius:6px;font-size:9px;color:var(--t2);line-height:1.5}
.qa .r{color:var(--ac);font-weight:600}
.top1-why{margin:0 20px 10px;padding:10px 14px;background:linear-gradient(135deg,rgba(150,79,76,.06),rgba(150,79,76,.02));border:1px solid rgba(150,79,76,.15);border-radius:10px}
.top1-why h4{font-size:12px;color:var(--ac);margin-bottom:4px}
.top1-why p{font-size:11px;color:var(--t2);line-height:1.5}
/* analysis panel */
.apanel{margin:0 20px 12px;border:1px solid var(--bd);border-radius:10px;background:#fff;overflow:hidden}
.apanel summary{padding:10px 14px;font-size:12px;font-weight:600;color:var(--ac);cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px}
.apanel summary::before{content:"▶";font-size:9px;transition:transform .2s}
.apanel[open] summary::before{transform:rotate(90deg)}
.apanel .abody{padding:0 14px 12px}
.alert{padding:6px 10px;border-radius:6px;font-size:10px;margin-bottom:6px;line-height:1.4}
.alert-err{background:rgba(150,79,76,.08);color:var(--ac);border:1px solid rgba(150,79,76,.15)}
.alert-wn{background:rgba(160,120,48,.08);color:var(--wn);border:1px solid rgba(160,120,48,.15)}
.alert-ok{background:rgba(107,127,94,.08);color:var(--ok);border:1px solid rgba(107,127,94,.15)}
.bar-chart{display:flex;align-items:end;gap:3px;height:40px;margin:6px 0}
.bar-chart .bar{min-width:20px;border-radius:3px 3px 0 0;background:var(--ac);position:relative;transition:height .3s}
.bar-chart .bar span{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--t2);white-space:nowrap}
.bar-chart .bar-label{font-size:8px;color:var(--t2);text-align:center;margin-top:2px}
.impact-row{display:flex;align-items:center;gap:6px;font-size:10px;margin:3px 0}
.impact-bar{height:6px;border-radius:3px;background:var(--ac);transition:width .3s}
.axes-chart{display:flex;gap:2px;align-items:end;height:50px;margin:4px 0}
.axes-chart .ax{flex:1;border-radius:3px 3px 0 0;position:relative;transition:height .3s}
.axes-chart .ax span{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--t2);white-space:nowrap}
.axes-chart .ax .axv{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:600;color:var(--tx)}
.cmp-diff{margin:0 20px 10px;padding:10px 14px;background:rgba(79,151,163,.06);border:1px solid rgba(79,151,163,.15);border-radius:10px}
.cmp-diff h4{font-size:12px;color:#4F97A3;margin-bottom:4px}
.cmp-diff p{font-size:11px;color:var(--t2);line-height:1.5}
.empty{text-align:center;padding:50px 20px;color:var(--t3)}
.no-img{width:100%;aspect-ratio:4/5;background:var(--sf);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:11px}
</style>
</head>
<body>

<div class="hd">
  <div><h1>ColorFit</h1><span class="tag">QA Simulator</span><div class="sub" id="ver"></div></div>
  <button class="mode-btn" id="cmp-btn" onclick="toggleCompare()">비교 모드</button>
</div>

<div class="wiz" id="wiz"></div>
<div class="nav" id="nav"></div>
<div class="state" id="state"></div>
<div class="rbar" id="rbar"></div>
<div id="top1why"></div>
<div id="analysis"></div>
<div id="cmpdiff"></div>
<div id="content"></div>

<script>
const D=typeof INLINE_DATA!=="undefined"?INLINE_DATA:[];

/* ── 매핑 ── */
const T_KR={commute:"출근",interview:"면접",campus:"캠퍼스",date:"데이트",weekend:"주말",travel:"여행",event:"행사",workout:"운동"};
const TN_KR={spring_warm_light:"봄웜 라이트",spring_warm_bright:"봄웜 브라이트",spring_warm_mute:"봄웜 뮤트",summer_cool_light:"여름쿨 라이트",summer_cool_soft:"여름쿨 소프트",summer_cool_mute:"여름쿨 뮤트",autumn_warm_deep:"가을웜 딥",autumn_warm_bright:"가을웜 브라이트",autumn_warm_mute:"가을웜 뮤트",winter_cool_deep:"겨울쿨 딥",winter_cool_bright:"겨울쿨 브라이트",winter_cool_light:"겨울쿨 라이트"};
const S_KR={casual:"캐주얼",formal:"포멀",minimal:"미니멀",feminine:"페미닌",sporty:"스포티"};
const M_KR={minimal:"미니멀",classic:"클래식",casual:"캐주얼",lovely:"러블리",street:"스트릿",editorial:"에디토리얼",dandy:"댄디",amekaji:"아메카지"};
const G_KR={modern_office:"모던오피스",vintage:"빈티지",sporty:"스포티",classic:"클래식"};
const F_KR={oversized:"오버사이즈",regular:"레귤러핏",slim:"슬림핏"};
const C_KR={mono:"모노톤",neutral:"뉴트럴",pastel:"파스텔",vivid:"비비드"};
const AX={pcf:"컬러매칭",of:"상황최적",ch:"색감조화",pe:"가성비",sf:"실루엣"};
const M_BY_G={female:["minimal","classic","casual","lovely","street","editorial"],male:["minimal","classic","casual","dandy","street","amekaji"]};
const TPO_RE={interview:{casual:["minimal","feminine"],street:["minimal"],sporty:["minimal"]},event:{casual:["feminine","minimal"],street:["minimal"],sporty:["feminine"]},commute:{sporty:["casual","minimal"],street:["casual"]},workout:{formal:["sporty"],minimal:["sporty","casual"]}};
const S_SIM={casual:["minimal","street"],formal:["minimal","classic"],minimal:["formal","casual"],feminine:["elegant","romantic"],sporty:["casual","street"],classic:["formal","minimal"],street:["casual","sporty"],dandy:["formal","classic"]};

/* ── 단계 정의 ── */
const STEPS=[
  {key:"gender",title:"성별",opts:[{v:"female",l:"여성"},{v:"male",l:"남성"}]},
  {key:"tone",title:"퍼스널컬러",opts:[]},
  {key:"tpo",title:"TPO",opts:["commute","interview","campus","date","weekend","travel","event","workout"].map(t=>({v:t,l:T_KR[t]}))},
  {key:"mood",title:"분위기",opts:[]},
  {key:"budget",title:"예산",type:"slider"},
  {key:"style",title:"스타일",opts:[{v:"casual",l:"캐주얼"},{v:"formal",l:"포멀"},{v:"minimal",l:"미니멀"},{v:"feminine",l:"페미닌"},{v:"sporty",l:"스포티"}]},
  {key:"genre",title:"장르",opts:[{v:"modern_office",l:"모던오피스"},{v:"vintage",l:"빈티지"},{v:"sporty",l:"스포티"},{v:"classic",l:"클래식"}]},
  {key:"fit",title:"핏",opts:[{v:"oversized",l:"오버사이즈"},{v:"regular",l:"레귤러핏"},{v:"slim",l:"슬림핏"}]},
  {key:"color",title:"컬러",opts:[{v:"mono",l:"모노톤"},{v:"neutral",l:"뉴트럴"},{v:"pastel",l:"파스텔"},{v:"vivid",l:"비비드"}]},
];
const TOTAL=STEPS.length;

/* ── 상태 ── */
let cur=0;
let ST={gender:"",tone:"",tpo:"",mood:"",budget:500000,style:"",genre:"",fit:"",color:""};
let cmpMode=false;
let ST2={gender:"",tone:"",tpo:"",mood:"",budget:500000,style:"",genre:"",fit:"",color:""};
let cmpSlot=1; // 1 or 2

function toggleCompare(){
  cmpMode=!cmpMode;
  document.getElementById("cmp-btn").classList.toggle("on",cmpMode);
  if(cmpMode){
    ST2={...ST};
    // B 조건을 자동으로 한 가지 변경 (즉시 차이 체감)
    const styles=["casual","formal","minimal","feminine","sporty"];
    const curIdx=styles.indexOf(ST.style);
    ST2.style=styles[(curIdx+1)%styles.length]||"minimal";
    cmpSlot=2; // B 편집 상태로 시작
  }
  renderAll();
}

/* ── 초기화 ── */
function init(){
  if(!D.length){document.getElementById("content").innerHTML='<div class="empty">outfits_data.js 로드 실패</div>';return;}
  document.getElementById("ver").textContent=D.length+"개 코디";
  // 톤 옵션
  STEPS[1].opts=[...new Set(D.filter(o=>o.tone_id).map(o=>o.tone_id))].sort().map(t=>({v:t,l:TN_KR[t]||t}));
  renderAll();
}

function renderAll(){
  renderWiz();renderNav();renderState();renderResults();
}

/* ── 위자드 ── */
function renderWiz(){
  const w=document.getElementById("wiz");
  const s=cmpMode&&cmpSlot===2?ST2:ST;
  // 무드는 성별 연동
  if(STEPS[3].key==="mood"){
    const g=s.gender;
    STEPS[3].opts=(g?M_BY_G[g]||[]:["minimal","classic","casual","lovely","street","editorial","dandy","amekaji"]).map(m=>({v:m,l:M_KR[m]||m}));
  }
  let html="";
  STEPS.forEach((st,i)=>{
    const done=i<cur,isCur=i===cur;
    const cls=done?"step vis done":isCur?"step vis cur":"step";
    const val=s[st.key];
    const valLabel=getLabel(st,val);
    html+=`<div class="${cls}" data-i="${i}">
      <div class="step-head" style="cursor:pointer" onclick="goStep(${i})">
        <div class="step-num">${i+1}</div>
        <div class="step-title">${st.title}</div>
        ${val?`<div class="step-val">${valLabel}</div>`:""}
      </div>
      ${isCur?renderStepBody(st,s):""}
    </div>`;
  });
  w.innerHTML=html;
  if(cmpMode){
    const slotA=cmpSlot===1,slotB=cmpSlot===2;
    w.innerHTML=`<div style="padding:8px 20px;font-size:12px;background:rgba(150,79,76,.05);border-bottom:1px solid var(--bd)">
      <div style="font-weight:600;color:var(--ac);margin-bottom:6px">🔄 비교 모드 — 두 조건의 추천 차이를 비교합니다</div>
      <div style="display:flex;gap:8px">
        <button onclick="cmpSlot=1;renderAll()" style="flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid ${slotA?'var(--ac)':'var(--bd)'};background:${slotA?'var(--ac)':'#fff'};color:${slotA?'#fff':'var(--tx)'}">
          ✏️ 조건 A 편집${slotA?" (선택중)":""}
        </button>
        <button onclick="cmpSlot=2;renderAll()" style="flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid ${slotB?'#4F97A3':'var(--bd)'};background:${slotB?'#4F97A3':'#fff'};color:${slotB?'#fff':'var(--tx)'}">
          ✏️ 조건 B 편집${slotB?" (선택중)":""}
        </button>
      </div>
      <p style="font-size:10px;color:var(--t3);margin-top:4px">위 버튼으로 A/B를 전환한 뒤, 아래 위자드에서 조건을 변경하세요</p>
    </div>`+w.innerHTML;
  }
}

function renderStepBody(st,s){
  if(st.type==="slider"){
    return`<div class="slider-w"><input type="range" min="30000" max="500000" step="10000" value="${s.budget}" oninput="setSel('budget',+this.value);document.getElementById('bv').textContent=this.value>=500000?'전체':'~₩'+(this.value/1000).toFixed(0)+'K'"><span id="bv">${s.budget>=500000?"전체":"~₩"+(s.budget/1000).toFixed(0)+"K"}</span></div>`;
  }
  return`<div class="chips">${st.opts.map(o=>`<div class="ch${s[st.key]===o.v?" on":""}" onclick="setSel('${st.key}','${o.v}')">${o.l}</div>`).join("")}</div>`;
}

function getLabel(st,val){
  if(!val)return"";
  if(st.key==="budget")return val>=500000?"전체":"~₩"+(val/1000).toFixed(0)+"K";
  const found=st.opts.find(o=>o.v===val);
  return found?found.l:val;
}

function setSel(key,val){
  const s=cmpMode&&cmpSlot===2?ST2:ST;
  s[key]=s[key]===val?"":val;
  // 성별 바뀌면 무드 초기화
  if(key==="gender")s.mood="";
  renderAll();
}

function goStep(i){cur=i;renderAll();}

/* ── 네비 ── */
function renderNav(){
  const n=document.getElementById("nav");
  const isLast=cur>=TOTAL-1;
  n.innerHTML=`
    <button class="prev" ${cur===0?"disabled":""} onclick="cur=Math.max(0,cur-1);renderAll()">← 이전</button>
    ${isLast?`<button class="see" onclick="cur=TOTAL;renderAll()">결과 보기</button>`:`<button class="next" onclick="cur=Math.min(TOTAL,cur+1);renderAll()">다음 →</button>`}
  `;
}

/* ── 상태바 ── */
function renderState(){
  const el=document.getElementById("state");
  function pills(s,label){
    const ps=[];
    if(s.gender)ps.push(s.gender==="female"?"여성":"남성");
    if(s.tone)ps.push(TN_KR[s.tone]||s.tone);
    if(s.tpo)ps.push(T_KR[s.tpo]);
    if(s.mood)ps.push(M_KR[s.mood]||s.mood);
    if(s.budget<500000)ps.push("~₩"+(s.budget/1000).toFixed(0)+"K");
    if(s.style)ps.push(S_KR[s.style]||s.style);
    if(s.genre)ps.push(G_KR[s.genre]||s.genre);
    if(s.fit)ps.push(F_KR[s.fit]||s.fit);
    if(s.color)ps.push(C_KR[s.color]||s.color);
    return(label?`<span style="font-weight:600;color:var(--ac);margin-right:2px">${label}</span>`:"")+
      (ps.length?ps.map(p=>`<span class="sp">${p}</span>`).join(""):'<span style="color:var(--t3)">선택 없음</span>');
  }
  if(cmpMode){
    el.innerHTML=pills(ST,"A: ")+`<span style="margin:0 4px;color:var(--t3)">vs</span>`+pills(ST2,"B: ");
  }else{
    el.innerHTML=pills(ST,"");
  }
}

/* ── 스코어링 (앱 동일) ── */
function clsColor(hexes){
  if(!hexes.length)return"neutral";
  let r=0,g=0,b=0;hexes.forEach(h=>{r+=parseInt(h.slice(1,3),16);g+=parseInt(h.slice(3,5),16);b+=parseInt(h.slice(5,7),16)});
  const n=hexes.length;r/=n;g/=n;b/=n;
  const sat=Math.max(r,g,b)-Math.min(r,g,b),br=(r+g+b)/3;
  if(sat<40&&br<100)return"mono";if(sat<60)return"neutral";if(br>180&&sat<100)return"pastel";if(sat>=100)return"vivid";return"neutral";
}

/* ── A. 가중 점수 체계 (TPO 우선) ── */
// TPO가 맥락, 스타일/무드가 세부 정렬, 컬러/핏/장르가 보정
const W={style:3,mood:3,genre:1,fit:1,color:1}; // 가중치

function score(o,s){
  let sc=0;const rs=[];const detail={style:0,mood:0,genre:0,fit:0,color:0};
  const re=(TPO_RE[s.tpo]||{})[s.style]||[];
  const sim=S_SIM[s.style]||[];

  // 스타일 (가중 3)
  if(s.style){
    if(o.style_tag===s.style){detail.style=2;rs.push("스타일 일치")}
    else if(re.includes(o.style_tag)){detail.style=2;rs.push(`TPO재해석(${S_KR[s.style]||s.style}→${S_KR[o.style_tag]||o.style_tag})`)}
    else if(sim.includes(o.style_tag)){detail.style=1;rs.push(`유사(${S_KR[o.style_tag]||o.style_tag})`)}
  }
  // 무드 (가중 3)
  if(s.mood){if((o.designed_moods||[]).includes(s.mood)){detail.mood=2;rs.push("무드일치")}}
  // 장르 (가중 1)
  if(s.genre){
    const gm={modern_office:["formal","minimal"],vintage:["classic"],sporty:["sporty"],classic:["classic","formal"]};
    if((gm[s.genre]||[]).some(t=>(o.designed_moods||[]).includes(t)||o.style_tag===t)){detail.genre=1;rs.push("장르매칭")}
  }
  // 핏 (가중 1)
  if(s.fit){
    const sils=(o.items||[]).map(i=>i.silhouette||"regular");
    const fm={oversized:["oversized","relaxed"],slim:["slim","fitted"],regular:["regular"]};
    if(sils.some(sl=>(fm[s.fit]||[]).includes(sl))){detail.fit=2;rs.push("핏일치")}
  }
  // 컬러 (가중 1)
  if(s.color){
    const hx=(o.items||[]).map(i=>i.color_hex||"").filter(h=>h.length>=7);
    if(hx.length&&clsColor(hx)===s.color){detail.color=2;rs.push("컬러일치")}
  }

  sc=detail.style*W.style+detail.mood*W.mood+detail.genre*W.genre+detail.fit*W.fit+detail.color*W.color;
  return{sc,rs,detail};
}

/* ── B. "결정형 메시지" 생성 ── */
function buildDecisionMsg(r,s){
  const o=r.o,sc=o.scores||{},st=o.style_tag,items=o.items||[];
  const tpo=T_KR[s.tpo]||"일상",sty=S_KR[st]||st||"",mood=s.mood?M_KR[s.mood]:"";
  const cats=items.map(i=>i.category).filter(Boolean);
  const favg=o.formality_avg||0;
  const re=(TPO_RE[s.tpo]||{})[s.style];
  const maxSc=Object.values(W).reduce((a,w)=>a+2*w,0);
  const confidence=Math.min(99,Math.round((r.sc/Math.max(maxSc,1)*40)+(sc.total||0)/100*40+(sc.of||0)/100*20));

  // 1) 한 줄 결론
  let decision;
  const TPO_DECISION={
    interview:`면접에서 가장 안정적으로 신뢰감을 줄 수 있는 선택입니다.`,
    commute:`출근 자리에서 무난하면서도 스타일을 챙긴 코디입니다.`,
    date:`부담 없이 좋은 인상을 남길 수 있는 코디입니다.`,
    event:`행사 자리에서 품격을 유지하면서 돋보이는 코디입니다.`,
    campus:`캠퍼스에서 자연스럽게 세련된 느낌을 주는 코디입니다.`,
    weekend:`편안하면서도 잘 갖춰 입은 느낌의 주말 코디입니다.`,
    travel:`활동적이면서도 스타일을 놓치지 않는 여행 코디입니다.`,
    workout:`운동에 최적화된 기능적이면서 깔끔한 코디입니다.`,
  };
  decision=TPO_DECISION[s.tpo]||`현재 조건에서 가장 균형 잡힌 코디입니다.`;

  // 2) 핵심 근거 (최대 3개, 짧게)
  const ev=[];
  if(re)ev.push(`${sty} 스타일이 ${tpo}에 적합하도록 재해석됨`);
  else if(r.detail.style>=2)ev.push(`${sty} 스타일이 ${tpo} 상황과 부합`);
  if(sc.of>=80)ev.push(`TPO 적합도 ${sc.of.toFixed(0)}점 — 상황에 최적화`);
  if(mood&&r.detail.mood>=2)ev.push(`${mood} 분위기 반영`);
  if(sc.pcf>=75&&!ev.some(e=>e.includes("컬러")))ev.push(`퍼스널컬러 매칭 ${sc.pcf.toFixed(0)}점`);
  if(cats.length>=3&&ev.length<3)ev.push(`${cats.slice(0,3).join("+")} 완성형 구성`);
  if(!ev.length)ev.push(`총점 ${(sc.total||0).toFixed(1)}점 고품질`);

  // 3) 실패 방지 (한 줄)
  let guard;
  if(s.tpo==="interview")guard=favg>=3.8?`격식도 ${favg.toFixed(1)} — 면접 기준 충족, 부정적 인상 위험 낮음`:`면접에 무난한 수준의 격식`;
  else if(s.tpo==="date")guard=`과하지 않아 부담스러운 인상을 줄 가능성 낮음`;
  else if(s.tpo==="commute")guard=`오피스에서 어색하지 않은 안정적 구성`;
  else guard=`과한 요소 배제 — 실패 가능성 최소화`;

  return{decision,evidence:ev.slice(0,3),guard,confidence};
}

/* ── C. 다양성 강제 rerank ── */
function diversityRerank(results){
  if(results.length<=1)return results;

  const picks=[];
  const usedStyles=new Set();
  const usedCombos=new Set();
  const usedSils=new Set();

  // Top1 확정
  picks.push(results[0]);
  usedStyles.add(results[0].o.style_tag);
  usedCombos.add(getCombo(results[0].o));
  usedSils.add(getSilKey(results[0].o));

  const pool=results.slice(1);

  // Top2: 반드시 다른 스타일 OR 다른 구성 OR 다른 실루엣
  const pick2=pool.find(r=>!usedStyles.has(r.o.style_tag)&&!usedCombos.has(getCombo(r.o)))
    ||pool.find(r=>!usedStyles.has(r.o.style_tag))
    ||pool.find(r=>!usedCombos.has(getCombo(r.o)))
    ||pool.find(r=>!usedSils.has(getSilKey(r.o)))
    ||pool[0];
  if(pick2){picks.push(pick2);usedStyles.add(pick2.o.style_tag);usedCombos.add(getCombo(pick2.o));usedSils.add(getSilKey(pick2.o));}

  // Top3: 또 다른 차별점
  const remain=pool.filter(r=>!picks.includes(r));
  const pick3=remain.find(r=>!usedStyles.has(r.o.style_tag)&&!usedCombos.has(getCombo(r.o)))
    ||remain.find(r=>!usedStyles.has(r.o.style_tag))
    ||remain.find(r=>!usedCombos.has(getCombo(r.o))&&!usedSils.has(getSilKey(r.o)))
    ||remain[0];
  if(pick3){picks.push(pick3);usedStyles.add(pick3.o.style_tag);usedCombos.add(getCombo(pick3.o));usedSils.add(getSilKey(pick3.o));}

  // 나머지: 반복 패널티 가중
  const rest=remain.filter(r=>!picks.includes(r)).map(r=>{
    let pen=0;
    if(usedStyles.has(r.o.style_tag))pen+=1.5;
    if(usedCombos.has(getCombo(r.o)))pen+=1;
    if(usedSils.has(getSilKey(r.o)))pen+=0.5;
    return{...r,sc:r.sc-pen};
  }).sort((a,b)=>b.sc!==a.sc?b.sc-a.sc:(b.o.scores?.total||0)-(a.o.scores?.total||0));

  return[...picks,...rest];
}

function getSilKey(o){return[...new Set((o.items||[]).map(i=>i.silhouette||"regular"))].sort().join("+")}

function getCombo(o){return(o.items||[]).map(i=>i.category||"").sort().join("+")}

/* ── 메인 실행 ── */
function run(s){
  const all=D.filter(o=>o.scores&&o.scores.total);
  const hard=all.filter(o=>{
    if(s.tpo&&!(o.designed_tpo||[]).map(t=>t.toLowerCase()).includes(s.tpo))return false;
    if(s.gender&&o.gender!==s.gender)return false;
    if(s.tone&&o.tone_id!==s.tone)return false;
    if(s.budget<500000){const p=o.total_price||o.price_total||0;if(p>s.budget*1.5)return false;}
    return true;
  });
  const hasSoft=s.style||s.mood||s.genre||s.fit||s.color;
  const scored=hard.map(o=>{const{sc,rs,detail}=score(o,s);return{o,sc,rs,detail}}).sort((a,b)=>b.sc!==a.sc?b.sc-a.sc:(b.o.scores?.total||0)-(a.o.scores?.total||0));
  const matched=scored.filter(r=>r.sc>0);
  let results=hasSoft&&matched.length?matched:scored;
  results=diversityRerank(results);
  return{hard:hard.length,total:scored.length,matched:matched.length,hasSoft,results,fallback:hasSoft&&!matched.length};
}

/* ── 분석 패널 ── */
function renderAnalysis(r,show){
  const el=document.getElementById("analysis");
  if(!show.length){el.innerHTML="";return;}

  const alerts=[];
  const allRes=r.results;

  // 1) 스타일 편향 감지
  const stDist={};allRes.forEach(({o})=>{const s=o.style_tag||"?";stDist[s]=(stDist[s]||0)+1});
  const stEntries=Object.entries(stDist).sort((a,b)=>b[1]-a[1]);
  if(stEntries.length>0){
    const topPct=stEntries[0][1]/allRes.length*100;
    if(topPct>70)alerts.push({type:"wn",msg:`스타일 편향: ${S_KR[stEntries[0][0]]||stEntries[0][0]}이 ${topPct.toFixed(0)}% 차지 — 다양성 부족`});
    else if(stEntries.length<=2&&allRes.length>5)alerts.push({type:"wn",msg:`스타일 다양성 부족: ${stEntries.length}종류만 존재`});
  }

  // 2) fallback 감지
  if(r.fallback)alerts.push({type:"err",msg:"Soft 필터 매칭 0건 → fallback 발생. 선택 조건이 이 TPO에 맞지 않을 수 있음"});

  // 3) 매칭률
  if(r.hasSoft&&r.matched>0){
    const rate=r.matched/r.total*100;
    if(rate<20)alerts.push({type:"wn",msg:`매칭률 ${rate.toFixed(0)}%로 낮음 — 선택 조건이 데이터와 괴리`});
    else if(rate>80)alerts.push({type:"ok",msg:`매칭률 ${rate.toFixed(0)}% — 선택 조건과 데이터 잘 부합`});
  }

  // 4) 가격 편중
  const prices=allRes.map(({o})=>o.total_price||o.price_total||0).filter(p=>p>0);
  if(prices.length>3){
    const avg=prices.reduce((a,b)=>a+b,0)/prices.length;
    const std=Math.sqrt(prices.reduce((s,p)=>s+(p-avg)**2,0)/prices.length);
    if(std/avg<0.15)alerts.push({type:"wn",msg:`가격 편중: 평균 ₩${(avg/1000).toFixed(0)}K ±${(std/1000).toFixed(0)}K (변동 ${(std/avg*100).toFixed(0)}%)`});
  }

  // 5) 다양성 분석 (상위 5개)
  const top5show=show.slice(0,5);
  if(top5show.length>=3){
    const t5styles=new Set(top5show.map(r=>r.o.style_tag));
    const t5combos=new Set(top5show.map(r=>getCombo(r.o)));
    if(t5styles.size===1)alerts.push({type:"err",msg:`상위 5개 다양성 부족: 모두 ${S_KR[[...t5styles][0]]||[...t5styles][0]} 스타일`});
    else if(t5styles.size<=2)alerts.push({type:"wn",msg:`상위 5개 스타일 ${t5styles.size}종 — 약간 편향`});
    else alerts.push({type:"ok",msg:`상위 5개 스타일 ${t5styles.size}종, 구성 ${t5combos.size}종 — 다양성 양호`});
  }

  // 6) TPO 영향력 체크
  if(ST.tpo&&r.hard>0){
    const tpoRate=r.hard/allRes.length*100;
    if(r.hard<5)alerts.push({type:"wn",msg:`TPO '${T_KR[ST.tpo]}' 데이터 ${r.hard}건으로 매우 적음`});
  }

  if(!alerts.length)alerts.push({type:"ok",msg:"이상 탐지 없음 — 결과 품질 양호"});

  // 상태 요약 한 줄
  const statusParts=[];
  if(ST.tpo){const tRate=r.hard/allRes.length*100;statusParts.push(tRate>20?`TPO 적합성 높음`:`TPO 후보 ${r.hard}건 (${tRate.toFixed(0)}%)`)}
  if(r.hasSoft)statusParts.push(r.matched>0?`매칭 ${r.matched}건 확보`:`fallback 발생`);
  const t3div=show.slice(0,3);
  const t3s=new Set(t3div.map(r=>r.o.style_tag));
  statusParts.push(t3s.size>=3?"다양성 우수":t3s.size>=2?"다양성 확보":"다양성 부족");

  // 5) 스타일 분포 차트
  const maxSt=Math.max(...stEntries.map(e=>e[1]),1);
  const stChart=stEntries.slice(0,5).map(([s,n])=>`<div style="text-align:center"><div class="bar" style="height:${n/maxSt*36}px;width:24px;background:var(--ac);border-radius:3px 3px 0 0;display:inline-block;position:relative"><span style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--t2)">${n}</span></div><div style="font-size:8px;color:var(--t2);margin-top:2px">${S_KR[s]||s}</div></div>`).join("");

  // 6) 필터 영향도
  const filterImpact=calcFilterImpact();

  // 7) Top5 평균 5축 점수
  const top5=show.slice(0,5);
  const axAvg={pcf:0,of:0,ch:0,pe:0,sf:0};
  top5.forEach(({o})=>{const s=o.scores||{};for(const a in axAvg)axAvg[a]+=(s[a]||0)});
  for(const a in axAvg)axAvg[a]=axAvg[a]/Math.max(top5.length,1);
  const axMax=Math.max(...Object.values(axAvg),1);
  const axColors={pcf:"#964F4C",of:"#4F97A3",ch:"#A07830",pe:"#6B7F5E",sf:"#6B5B8A"};

  el.innerHTML=`
  <details class="apanel" open>
    <summary>📊 분석 대시보드</summary>
    <div class="abody">
      <div style="font-size:11px;padding:6px 10px;border-radius:6px;background:rgba(107,127,94,.06);color:var(--ok);margin-bottom:8px;font-weight:500">📋 ${statusParts.join(" · ")}</div>
      <div style="font-size:11px;font-weight:600;margin-bottom:4px">이상 탐지</div>
      ${alerts.map(a=>`<div class="alert alert-${a.type}">${a.type==="err"?"🚨":a.type==="wn"?"⚠":"✓"} ${a.msg}</div>`).join("")}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px">
        <div>
          <div style="font-size:11px;font-weight:600;margin-bottom:4px">스타일 분포</div>
          <div style="display:flex;align-items:end;gap:4px;height:50px">${stChart}</div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;margin-bottom:4px">Top5 평균 5축</div>
          <div style="display:flex;gap:2px;align-items:end;height:50px">
            ${["pcf","of","ch","pe","sf"].map(a=>`<div style="flex:1;text-align:center"><div style="height:${axAvg[a]/axMax*36}px;background:${axColors[a]};border-radius:3px 3px 0 0;margin:0 auto;width:100%;position:relative"><span style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:600">${axAvg[a].toFixed(0)}</span></div><div style="font-size:7px;color:var(--t2);margin-top:2px">${AX[a]}</div></div>`).join("")}
          </div>
        </div>
      </div>

      <div style="margin-top:10px">
        <div style="font-size:11px;font-weight:600;margin-bottom:4px">필터 영향도</div>
        ${filterImpact}
      </div>
    </div>
  </details>`;
}

function calcFilterImpact(){
  const all=D.filter(o=>o.scores&&o.scores.total).length;
  const steps=[
    {label:"전체",count:all},
  ];
  let pool=D.filter(o=>o.scores&&o.scores.total);
  if(ST.gender){pool=pool.filter(o=>o.gender===ST.gender);steps.push({label:"성별",count:pool.length})}
  if(ST.tone){pool=pool.filter(o=>o.tone_id===ST.tone);steps.push({label:"톤",count:pool.length})}
  if(ST.tpo){pool=pool.filter(o=>(o.designed_tpo||[]).map(t=>t.toLowerCase()).includes(ST.tpo));steps.push({label:"TPO",count:pool.length})}
  if(ST.budget<500000){pool=pool.filter(o=>(o.total_price||o.price_total||0)<=ST.budget*1.5);steps.push({label:"예산",count:pool.length})}

  return steps.map((s,i)=>{
    const pct=s.count/all*100;
    const drop=i>0?steps[i-1].count-s.count:0;
    return`<div class="impact-row">
      <span style="min-width:32px;font-weight:500">${s.label}</span>
      <div style="flex:1;background:var(--sf);border-radius:3px;height:6px;overflow:hidden"><div class="impact-bar" style="width:${pct}%"></div></div>
      <span style="min-width:45px;text-align:right">${s.count}건</span>
      ${drop>0?`<span style="color:var(--wn);min-width:35px;text-align:right">-${drop}</span>`:`<span style="min-width:35px"></span>`}
    </div>`;
  }).join("");
}

function renderCompare(){
  const r1=run(ST),r2=run(ST2);
  const bar=document.getElementById("rbar");
  bar.innerHTML=`비교: <b>A ${r1.matched||r1.total}건</b> vs <b>B ${r2.matched||r2.total}건</b>`;
  document.getElementById("top1why").innerHTML="";
  document.getElementById("analysis").innerHTML="";

  // 차이 분석
  const diff=document.getElementById("cmpdiff");
  const diffs=[];
  if(ST.style!==ST2.style)diffs.push(`스타일: ${S_KR[ST.style]||ST.style||"없음"} → ${S_KR[ST2.style]||ST2.style||"없음"}`);
  if(ST.mood!==ST2.mood)diffs.push(`무드: ${M_KR[ST.mood]||ST.mood||"없음"} → ${M_KR[ST2.mood]||ST2.mood||"없음"}`);
  if(ST.tpo!==ST2.tpo)diffs.push(`TPO: ${T_KR[ST.tpo]||ST.tpo||"없음"} → ${T_KR[ST2.tpo]||ST2.tpo||"없음"}`);
  if(ST.fit!==ST2.fit)diffs.push(`핏: ${F_KR[ST.fit]||ST.fit||"없음"} → ${F_KR[ST2.fit]||ST2.fit||"없음"}`);
  if(ST.color!==ST2.color)diffs.push(`컬러: ${C_KR[ST.color]||ST.color||"없음"} → ${C_KR[ST2.color]||ST2.color||"없음"}`);
  if(ST.tone!==ST2.tone)diffs.push(`톤: ${TN_KR[ST.tone]||"없음"} → ${TN_KR[ST2.tone]||"없음"}`);

  const countDiff=`A: ${r1.matched||r1.total}건 vs B: ${r2.matched||r2.total}건 (차이 ${Math.abs((r1.matched||r1.total)-(r2.matched||r2.total))}건)`;
  const t1=r1.results[0],t2=r2.results[0];
  const scoreDiff=t1&&t2?`Top1 총점: A ${(t1.o.scores?.total||0).toFixed(1)} vs B ${(t2.o.scores?.total||0).toFixed(1)}`:"";
  const fbDiff=(r1.fallback?"A: fallback 발생 ":"")+(r2.fallback?"B: fallback 발생":"");

  if(!diffs.length){
    diff.innerHTML=`<div class="cmp-diff" style="border-color:var(--wn);background:rgba(160,120,48,.06)"><h4 style="color:var(--wn)">⚠ A와 B 조건이 동일합니다</h4><p>위에서 "조건 B 편집"을 선택한 뒤 위자드에서 스타일/무드/TPO 등을 변경하세요.</p></div>`;
  }else{
    // Top1 스타일 비교
    const st1=t1?S_KR[t1.o.style_tag]||t1.o.style_tag:"?";
    const st2=t2?S_KR[t2.o.style_tag]||t2.o.style_tag:"?";
    diff.innerHTML=`<div class="cmp-diff"><h4>🔍 A vs B 차이 분석</h4>
    <p><b>변경:</b> ${diffs.join(" | ")}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;font-size:11px">
      <div style="padding:6px 10px;background:rgba(150,79,76,.05);border-radius:6px;text-align:center">
        <div style="font-weight:700;color:var(--ac)">A: ${r1.matched||r1.total}건</div>
        <div style="color:var(--t2)">Top1 ${st1} · ${(t1?.o.scores?.total||0).toFixed(1)}점</div>
      </div>
      <div style="padding:6px 10px;background:rgba(79,151,163,.05);border-radius:6px;text-align:center">
        <div style="font-weight:700;color:#4F97A3">B: ${r2.matched||r2.total}건</div>
        <div style="color:var(--t2)">Top1 ${st2} · ${(t2?.o.scores?.total||0).toFixed(1)}점</div>
      </div>
    </div>
    ${fbDiff?`<p style="color:var(--wn);font-size:10px;margin-top:4px">⚠ ${fbDiff}</p>`:""}
    </div>`;
  }

  const lim=10;
  const s1=r1.results.slice(0,lim),s2=r2.results.slice(0,lim);
  document.getElementById("content").innerHTML=`<div class="compare">
    <div><div class="col-head">조건 A (${r1.matched||r1.total}건)</div>${s1.map((r,i)=>card(r,i+1)).join("")}</div>
    <div><div class="col-head">조건 B (${r2.matched||r2.total}건)</div>${s2.map((r,i)=>card(r,i+1)).join("")}</div>
  </div>`;
}

function card({o,sc,rs},rank){
  const tpos=(o.designed_tpo||[]).map(t=>`<span class="pl pl-t">${T_KR[t.toLowerCase()]||t}</span>`).join("");
  const moods=(o.designed_moods||[]).slice(0,2).map(m=>`<span class="pl pl-m">${M_KR[m]||m}</span>`).join("");
  const pr=o.total_price||o.price_total||0;
  const img=(o.items||[]).find(i=>i.image_url&&i.image_url.trim());
  const sils=[...new Set((o.items||[]).map(i=>i.silhouette||"regular"))];
  const s=o.scores||{};

  return`<div class="cd">
    ${img?`<img class="cd-img" src="${img.image_url}" referrerpolicy="no-referrer" loading="lazy" onerror="this.outerHTML='<div class=no-img>ERR</div>'">`:'<div class="no-img">이미지 없음</div>'}
    <div class="cd-b">
      <div class="pills">
        <span class="pl pl-t">#${rank}</span>${tpos}
        <span class="pl pl-g">${o.gender==="female"?"여성":"남성"}</span>
        <span class="pl pl-n">${TN_KR[o.tone_id]||"?"}</span>
        <span class="pl pl-s">${S_KR[o.style_tag]||o.style_tag||"?"}</span>
        ${moods}
        <span class="pl pl-f">${sils.map(s=>F_KR[s]||s).join("/")}</span>
        <span class="pl pl-fm">격식${(o.formality_avg||0).toFixed(1)}</span>
        <span class="pl pl-p">${pr?(pr/1000).toFixed(0)+"K":"?"}</span>
      </div>
      <div class="cd-sc">총점 <b>${(s.total||0).toFixed(1)}</b> | 매칭 <b style="color:${sc>0?'var(--ac)':'var(--t3)'}">${sc}점</b>${rank<=3?` <span style="background:${rank===1?'var(--ac)':rank===2?'#4F97A3':'var(--wn)'};color:#fff;padding:1px 5px;border-radius:4px;font-size:8px;margin-left:4px">Top${rank}</span>`:""}</div>
      <div style="display:flex;gap:1px;align-items:end;height:24px;margin:4px 0">${["pcf","of","ch","pe","sf"].map(a=>{const v=s[a]||0;const colors={pcf:"#964F4C",of:"#4F97A3",ch:"#A07830",pe:"#6B7F5E",sf:"#6B5B8A"};return`<div style="flex:1;text-align:center" title="${AX[a]} ${v.toFixed(0)}"><div style="height:${v/100*20}px;background:${colors[a]};border-radius:2px 2px 0 0;margin:0 auto;width:100%"></div><div style="font-size:6px;color:var(--t3);margin-top:1px">${AX[a].slice(0,2)}</div></div>`}).join("")}</div>
      <div class="cd-items">${(o.items||[]).map(it=>`<div class="cd-it"><img src="${it.image_url||''}" referrerpolicy="no-referrer" loading="lazy" onerror="this.style.display='none'"><span>${it.category||"?"}</span><span style="color:var(--ac)">${it.price?(it.price/1000).toFixed(0)+"K":""}</span></div>`).join("")}</div>
      ${rs.length?`<div class="qa"><b>QA:</b> ${rs.map(r=>`<span class="r">▸</span>${r}`).join(" ")}</div>`:""}
    </div>
  </div>`;
}

init();
</script>
</body>
</html>
