<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorFit Data Viewer</title>
<style>
  :root { --bg: #F8F6F3; --surface: #F0EDE8; --accent: #964F4C; --border: #E5E1DA; --text: #222; --text2: #8C8578; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard Variable', -apple-system, sans-serif; background: var(--bg); color: var(--text); }

  .header { position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 1px solid var(--border); padding: 16px 20px; }
  .header h1 { font-family: 'Nanum Myeongjo', serif; font-size: 22px; color: var(--accent); }
  .header p { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .filters { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 20px; background: #fff; border-bottom: 1px solid var(--border); }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; }
  .filter-group select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: #fff; }

  .stats { padding: 10px 20px; font-size: 12px; color: var(--text2); background: var(--surface); display: flex; gap: 16px; flex-wrap: wrap; }
  .stats b { color: var(--accent); }

  .empty { padding: 48px 20px; text-align: center; color: var(--text2); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty .msg { font-size: 15px; font-weight: 600; color: var(--text); }
  .empty .sub { font-size: 13px; margin-top: 8px; }

  .grid { padding: 12px 20px; display: flex; flex-direction: column; gap: 12px; }

  .card { background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .card-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .card-rank { font-family: 'Nanum Myeongjo', serif; font-size: 18px; font-weight: 700; color: var(--accent); }
  .card-score { font-size: 24px; font-weight: 700; }
  .card-id { font-size: 10px; color: var(--text2); font-family: monospace; word-break: break-all; padding: 0 16px; margin-top: 4px; }

  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 16px; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; }
  .pill-tpo { background: var(--accent); color: #fff; }
  .pill-gender { background: #4F97A3; color: #fff; }
  .pill-tone { background: #6B5876; color: #fff; }
  .pill-style { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

  .card-items { padding: 8px 16px 12px; }
  .card-items h4 { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
  .items-row { display: flex; gap: 8px; overflow-x: auto; }
  .item-chip { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 80px; }
  .item-img { width: 72px; height: 90px; border-radius: 6px; object-fit: cover; background: var(--surface); border: 1px solid var(--border); }
  .item-img-empty { width: 72px; height: 90px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--text2); }
  .item-cat { font-size: 11px; font-weight: 500; text-align: center; }
  .item-price { font-size: 10px; color: var(--text2); }

  .card-scores { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 8px 16px 12px; }
  .axis { text-align: center; }
  .axis-name { font-size: 10px; font-weight: 600; color: var(--text2); }
  .axis-bar { height: 6px; border-radius: 3px; background: var(--surface); margin: 3px 0; overflow: hidden; }
  .axis-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .axis-val { font-size: 11px; font-weight: 600; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; padding: 4px 16px 12px; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: var(--surface); color: var(--text2); }

  .axis-pcf .axis-fill { background: #964F4C; }
  .axis-of .axis-fill { background: #4F97A3; }
  .axis-ch .axis-fill { background: #DDB67D; }
  .axis-pe .axis-fill { background: #D1933F; }
  .axis-sf .axis-fill { background: #6B5876; }

  .coverage { padding: 16px 20px; }
  .coverage h3 { font-size: 14px; margin-bottom: 8px; }
  .coverage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 4px; }
  .cov-row { display: flex; justify-content: space-between; padding: 4px 8px; font-size: 12px; border-radius: 4px; }
  .cov-row.zero { background: #F5EDEC; color: var(--accent); font-weight: 600; }
  .cov-row.ok { background: var(--surface); }
</style>
</head>
<body>

<div class="header">
  <h1>ColorFit Data Viewer</h1>
  <p>TPO/성별/톤/스타일 조건별 코디 점검 뷰어 — 문제 케이스 발견 + 교정 요청용</p>
</div>

<div class="filters" id="filters">
  <div class="filter-group">
    <label>TPO</label>
    <select id="f-tpo"><option value="">전체</option></select>
  </div>
  <div class="filter-group">
    <label>성별</label>
    <select id="f-gender"><option value="">전체</option><option value="female">여성</option><option value="male">남성</option></select>
  </div>
  <div class="filter-group">
    <label>톤</label>
    <select id="f-tone"><option value="">전체</option></select>
  </div>
  <div class="filter-group">
    <label>스타일</label>
    <select id="f-style"><option value="">전체</option></select>
  </div>
  <div class="filter-group">
    <label>정렬</label>
    <select id="f-sort">
      <option value="total_desc">총점 높은순</option>
      <option value="total_asc">총점 낮은순</option>
      <option value="price_asc">가격 낮은순</option>
      <option value="price_desc">가격 높은순</option>
      <option value="formality_desc">포멀리티 높은순</option>
      <option value="formality_asc">포멀리티 낮은순</option>
    </select>
  </div>
  <div class="filter-group">
    <label>표시</label>
    <select id="f-limit">
      <option value="10">10개</option>
      <option value="20" selected>20개</option>
      <option value="50">50개</option>
      <option value="9999">전체</option>
    </select>
  </div>
</div>

<div class="stats" id="stats"></div>
<div id="content"></div>

<div class="coverage" id="coverage" style="display:none">
  <h3>0건 조건 (데이터 공백)</h3>
  <div class="coverage-grid" id="cov-grid"></div>
</div>

<script>
let DATA = [];
const TPOS = ["commute","interview","date","campus","weekend","travel","event","workout"];
const TPO_KR = {commute:"출근",interview:"면접",date:"데이트",campus:"캠퍼스",weekend:"주말",travel:"여행",event:"행사",workout:"운동"};
const AXIS_COLORS = {pcf:"#964F4C",of:"#4F97A3",ch:"#DDB67D",pe:"#D1933F",sf:"#6B5876"};
const AXIS_KR = {pcf:"컬러매칭",of:"상황적합",ch:"색조화",pe:"가성비",sf:"실루엣"};

async function loadData() {
  try {
    const r = await fetch("../backend/data/outfits_scored.json");
    DATA = await r.json();
  } catch(e) {
    // fallback: try relative path
    try {
      const r2 = await fetch("outfits_scored.json");
      DATA = await r2.json();
    } catch(e2) {
      document.getElementById("content").innerHTML = `<div class="empty"><div class="icon">!</div><div class="msg">데이터 로드 실패</div><div class="sub">이 파일을 로컬 서버로 열거나, outfits_scored.json을 같은 폴더에 복사하세요.<br><code>cd docs && python -m http.server 8080</code></div></div>`;
      return;
    }
  }
  initFilters();
  render();
}

function initFilters() {
  const tones = [...new Set(DATA.map(o => o.tone_id).filter(Boolean))].sort();
  const styles = [...new Set(DATA.map(o => o.style_tag).filter(Boolean))].sort();

  const tpoSel = document.getElementById("f-tpo");
  TPOS.forEach(t => { const op = document.createElement("option"); op.value = t; op.textContent = TPO_KR[t]||t; tpoSel.appendChild(op); });

  const toneSel = document.getElementById("f-tone");
  tones.forEach(t => { const op = document.createElement("option"); op.value = t; op.textContent = t; toneSel.appendChild(op); });

  const styleSel = document.getElementById("f-style");
  styles.forEach(s => { const op = document.createElement("option"); op.value = s; op.textContent = s; styleSel.appendChild(op); });

  document.querySelectorAll("select").forEach(sel => sel.addEventListener("change", render));
}

function getFiltered() {
  const tpo = document.getElementById("f-tpo").value;
  const gender = document.getElementById("f-gender").value;
  const tone = document.getElementById("f-tone").value;
  const style = document.getElementById("f-style").value;

  return DATA.filter(o => {
    if (tpo && !(o.designed_tpo || []).map(t=>t.toLowerCase()).includes(tpo)) return false;
    if (gender && o.gender !== gender) return false;
    if (tone && o.tone_id !== tone) return false;
    if (style && o.style_tag !== style) return false;
    if (!o.scores || !o.scores.total) return false;
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  const sort = document.getElementById("f-sort").value;
  const limit = parseInt(document.getElementById("f-limit").value);

  filtered.sort((a,b) => {
    switch(sort) {
      case "total_desc": return (b.scores?.total||0) - (a.scores?.total||0);
      case "total_asc": return (a.scores?.total||0) - (b.scores?.total||0);
      case "price_asc": return (a.price_total||a.total_price||0) - (b.price_total||b.total_price||0);
      case "price_desc": return (b.price_total||b.total_price||0) - (a.price_total||a.total_price||0);
      case "formality_desc": return (b.formality_avg||0) - (a.formality_avg||0);
      case "formality_asc": return (a.formality_avg||0) - (b.formality_avg||0);
    }
  });

  const shown = filtered.slice(0, limit);

  // Stats
  const totals = filtered.map(o => o.scores.total);
  const statsEl = document.getElementById("stats");
  if (filtered.length === 0) {
    statsEl.innerHTML = `<b>0건</b> — 해당 조건에 코디가 없습니다`;
  } else {
    const avg = (totals.reduce((a,b)=>a+b,0)/totals.length).toFixed(1);
    const min = Math.min(...totals).toFixed(1);
    const max = Math.max(...totals).toFixed(1);
    const prices = filtered.map(o => o.price_total||o.total_price||0).filter(p=>p>0);
    const avgPrice = prices.length ? Math.round(prices.reduce((a,b)=>a+b,0)/prices.length/1000) : 0;
    statsEl.innerHTML = `<span>결과 <b>${filtered.length}건</b> (표시 ${shown.length})</span>
      <span>총점 <b>${min}~${max}</b> (평균 ${avg})</span>
      <span>평균가격 <b>${avgPrice}K</b></span>`;
  }

  // Cards
  const contentEl = document.getElementById("content");
  if (shown.length === 0) {
    contentEl.innerHTML = `<div class="empty"><div class="icon">&#x1F50D;</div><div class="msg">결과 0건</div><div class="sub">이 조건 조합에 코디가 없습니다.<br>데이터 보강이 필요한 영역입니다.</div></div>`;
  } else {
    contentEl.innerHTML = `<div class="grid">${shown.map((o,i) => renderCard(o, i+1)).join("")}</div>`;
  }

  renderCoverage();
}

function renderCard(o, rank) {
  const s = o.scores || {};
  const price = o.price_total || o.total_price || 0;
  const tpos = (o.designed_tpo || []).map(t => `<span class="pill pill-tpo">${TPO_KR[t.toLowerCase()]||t}</span>`).join("");
  const items = (o.items || []).map(it => {
    const img = it.image_url
      ? `<img class="item-img" src="${it.image_url}" alt="${it.category}" referrerpolicy="no-referrer" loading="lazy" onerror="this.outerHTML='<div class=item-img-empty>No img</div>'">`
      : `<div class="item-img-empty">No img</div>`;
    return `<div class="item-chip">${img}<span class="item-cat">${it.category||"?"}</span><span class="item-price">${it.price ? (it.price/1000).toFixed(0)+"K" : ""}</span></div>`;
  }).join("");

  const axes = ["pcf","of","ch","pe","sf"].map(a => {
    const v = s[a] || 0;
    return `<div class="axis axis-${a}"><div class="axis-name">${AXIS_KR[a]}</div><div class="axis-bar"><div class="axis-fill" style="width:${v}%"></div></div><div class="axis-val">${v.toFixed(0)}</div></div>`;
  }).join("");

  const tags = (o.tags || []).map(t => `<span class="tag">${t}</span>`).join("");

  return `<div class="card">
    <div class="card-header">
      <span class="card-rank">#${rank}</span>
      <span class="card-score">${s.total?.toFixed(1) || "?"}</span>
    </div>
    <div class="card-id">${o.outfit_id || "?"}</div>
    <div class="card-meta">
      ${tpos}
      <span class="pill pill-gender">${o.gender === "female" ? "여성" : "남성"}</span>
      <span class="pill pill-tone">${(o.tone_id||"").replace(/_/g," ")}</span>
      <span class="pill pill-style">${o.style_tag||""}</span>
      <span class="pill pill-style">F${(o.formality_avg||0).toFixed(1)}</span>
      <span class="pill pill-style">${price ? (price/1000).toFixed(0)+"K" : "?"}</span>
    </div>
    <div class="card-items"><h4>아이템 구성 (${(o.items||[]).length}개)</h4><div class="items-row">${items}</div></div>
    <div class="card-scores">${axes}</div>
    <div class="card-tags">${tags}</div>
  </div>`;
}

function renderCoverage() {
  const covEl = document.getElementById("coverage");
  const gridEl = document.getElementById("cov-grid");
  const zeros = [];

  for (const tpo of TPOS) {
    for (const gender of ["female", "male"]) {
      const count = DATA.filter(o =>
        (o.designed_tpo||[]).map(t=>t.toLowerCase()).includes(tpo) &&
        o.gender === gender &&
        o.scores && o.scores.total
      ).length;
      if (count === 0) {
        zeros.push({tpo, gender, count});
      }
    }
  }

  if (zeros.length === 0) {
    covEl.style.display = "none";
  } else {
    covEl.style.display = "block";
    gridEl.innerHTML = zeros.map(z =>
      `<div class="cov-row zero">${TPO_KR[z.tpo]} + ${z.gender === "female" ? "여성" : "남성"} → <b>0건</b></div>`
    ).join("");
  }
}

loadData();
</script>
</body>
</html>
