<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorFit QA Simulator</title>
<script src="outfits_data.js"></script>
<style>
:root{--bg:#F8F6F3;--sf:#F0EDE8;--ac:#964F4C;--bd:#E5E1DA;--tx:#222;--t2:#8C8578;--t3:#B5AFA6;--ok:#6B7F5E;--wn:#A07830}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;max-width:480px;margin:0 auto}

.hd{position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:2px solid var(--ac);padding:10px 16px}
.hd h1{font-family:'Nanum Myeongjo',serif;font-size:18px;color:var(--ac);display:inline}
.hd .tag{font-size:8px;background:var(--ac);color:#fff;padding:1px 6px;border-radius:6px;margin-left:4px}
.hd-row{display:flex;justify-content:space-between;align-items:center}
.hd .sub{font-size:9px;color:var(--t3)}
.mode-tabs{display:flex;gap:4px;margin-top:6px}
.mode-tab{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid var(--bd);background:#fff;color:var(--tx);cursor:pointer}
.mode-tab.on{background:var(--ac);color:#fff;border-color:var(--ac)}

/* wizard */
.wiz{background:#fff;border-bottom:1px solid var(--bd)}
.st{padding:10px 16px;border-bottom:1px solid var(--bd)}
.st-h{display:flex;align-items:center;gap:6px;cursor:pointer}
.st-n{width:18px;height:18px;border-radius:50%;background:var(--bd);color:var(--t2);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.st.done .st-n,.st.cur .st-n{background:var(--ac);color:#fff}
.st-t{font-size:12px;font-weight:600}.st-v{font-size:10px;color:var(--ac);margin-left:auto}
.cps{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.cp{padding:4px 10px;border-radius:99px;font-size:10px;font-weight:500;border:1px solid var(--bd);background:#fff;color:var(--tx);cursor:pointer}
.cp:hover{border-color:var(--ac)}.cp.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.nav{display:flex;gap:6px;padding:8px 16px;background:var(--bg);border-bottom:1px solid var(--bd)}
.nav button{flex:1;padding:6px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer}
.nav .prev{background:var(--sf);color:var(--tx)}.nav .next,.nav .see{background:var(--ac);color:#fff}

/* state */
.state{padding:4px 16px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;flex-wrap:wrap;gap:3px;font-size:9px}
.sp{padding:1px 6px;border-radius:6px;background:var(--ac);color:#fff}

/* APP PREVIEW mode */
.app-preview{padding:0 16px 80px}
.ap-header{margin:12px 0 8px}
.ap-header h2{font-family:'Nanum Myeongjo',serif;font-size:20px;color:var(--ac)}
.ap-header p{font-size:11px;color:var(--t2);margin-top:2px}
.ap-card{border-radius:12px;overflow:hidden;background:#fff;border:1px solid var(--bd);margin-bottom:10px}
.ap-hero{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:var(--sf)}
.ap-overlay{position:relative}
.ap-overlay .ov{position:absolute;bottom:0;left:0;right:0;padding:30px 14px 12px 14px;background:linear-gradient(transparent,rgba(0,0,0,.7))}
.ap-overlay .ov h3{color:#fff;font-size:15px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.4)}
.ap-overlay .ov .price{color:#fff;font-size:17px;font-weight:700;margin-top:4px;text-shadow:0 1px 3px rgba(0,0,0,.4)}
.ap-overlay .ov .price small{font-size:10px;font-weight:400;opacity:.7;margin-left:4px}

.ap-items{padding:10px 12px;background:var(--sf);border-top:1px solid var(--bd)}
.ap-items h4{font-size:11px;font-weight:600;margin-bottom:6px}
.ap-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#fff;border:1px solid var(--bd);border-radius:8px;margin-bottom:4px;cursor:pointer;transition:border-color .15s}
.ap-item:hover{border-color:var(--ac)}
.ap-item img{width:40px;height:40px;border-radius:6px;object-fit:cover}
.ap-item .info{flex:1;min-width:0}
.ap-item .role{font-size:8px;font-weight:600;color:var(--ac);background:rgba(150,79,76,.08);padding:1px 4px;border-radius:3px}
.ap-item .cat{font-size:11px;font-weight:600;margin-left:4px}
.ap-item .brand{font-size:9px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ap-item .pr{font-size:11px;font-weight:700;white-space:nowrap}

.ap-reason{padding:10px 12px}
.ap-reason .core{font-size:12px;color:var(--tx);font-weight:600;line-height:1.4}
.ap-reason .guard{font-size:11px;color:var(--ok);margin-top:4px}
.ap-reason .situ{font-size:10px;color:var(--t2);margin-top:4px}

.ap-cta{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;padding:8px 16px 12px;background:linear-gradient(transparent,var(--bg) 20%);z-index:20}
.ap-cta button{width:100%;padding:12px;border-radius:12px;font-size:14px;font-weight:700;border:none;background:var(--ac);color:#fff;cursor:pointer}
.ap-cta .explore{width:100%;padding:8px;font-size:12px;color:var(--t2);background:none;border:none;cursor:pointer;margin-top:4px}

/* QA panel inside app preview */
.qa-panel{margin:8px 0;border:1px solid var(--bd);border-radius:8px;background:#fff;overflow:hidden}
.qa-panel summary{padding:8px 10px;font-size:10px;font-weight:600;color:var(--ac);cursor:pointer;list-style:none}
.qa-panel summary::before{content:"▶ ";font-size:8px}
.qa-panel[open] summary::before{content:"▼ "}
.qa-panel .qb{padding:0 10px 8px;font-size:9px;color:var(--t2);line-height:1.5}
.qa-panel .qb table{width:100%;border-collapse:collapse;margin-top:4px}
.qa-panel .qb td{padding:2px 4px;border-bottom:1px solid var(--bd);vertical-align:top}
.qa-panel .qb td:first-child{font-weight:600;color:var(--tx);width:100px;white-space:nowrap}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{width:100%;max-width:480px;background:var(--bg);border-radius:16px 16px 0 0;max-height:80vh;overflow-y:auto}
.modal .bar{width:32px;height:3px;border-radius:2px;background:var(--bd);margin:8px auto}
.modal .mb{padding:0 20px 24px}
.modal .mi{display:flex;gap:12px;margin-top:8px}
.modal .mi img{width:120px;height:120px;border-radius:10px;object-fit:cover;border:1px solid var(--bd)}
.modal .mi .det{flex:1}
.modal .mi .det h3{font-size:15px;font-weight:700;margin-top:4px;line-height:1.3}
.modal .mi .det .pr{font-size:20px;font-weight:700;color:var(--ac);margin-top:6px}
.modal .ctx{margin-top:10px;padding:8px 10px;background:var(--sf);border-radius:8px;font-size:10px;color:var(--t2);line-height:1.5}
.modal .btns{display:flex;gap:6px;margin-top:12px}
.modal .btns button,.modal .btns a{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;text-align:center;text-decoration:none;border:none;cursor:pointer}
.modal .btns .close{background:var(--sf);color:var(--tx)}.modal .btns .cta{background:var(--ac);color:#fff}
.modal .qa-detail{margin-top:10px;border-top:1px solid var(--bd);padding-top:8px}
.modal .qa-detail h5{font-size:10px;font-weight:600;color:var(--ac);margin-bottom:4px}
.modal .qa-detail table{width:100%;font-size:9px;border-collapse:collapse}
.modal .qa-detail td{padding:2px 4px;border-bottom:1px solid var(--bd)}
.modal .qa-detail td:first-child{font-weight:600;color:var(--tx);width:90px}

/* list mode (기존) */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;padding:12px 16px}
.cd{border:1px solid var(--bd);border-radius:8px;overflow:hidden;background:#fff}
.cd-img{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:var(--sf)}
.cd-b{padding:6px 8px;font-size:10px}
.pills{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:3px}
.pl{font-size:7px;padding:1px 4px;border-radius:4px;font-weight:500}
.pl-t{background:var(--ac);color:#fff}.pl-g{background:#4F97A3;color:#fff}
.pl-n{background:#A07830;color:#fff}.pl-s{background:#6B5B8A;color:#fff}
.pl-m{background:#E8DFF0;color:#6B5B8A}.pl-f{background:#D4EDDA;color:#155724}
.pl-p{background:var(--sf);color:var(--tx)}
.rbar{padding:6px 16px;font-size:11px;color:var(--t2);background:#fff;border-bottom:1px solid var(--bd)}
.rbar b{color:var(--tx)}.rbar .wn{color:var(--wn)}

.empty{text-align:center;padding:40px 16px;color:var(--t3)}
.no-img{width:100%;aspect-ratio:4/5;background:var(--sf);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:10px}
.hidden{display:none}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-row"><div><h1>ColorFit</h1><span class="tag">QA v6</span></div><div class="sub" id="ver"></div></div>
  <div class="mode-tabs" id="modes"></div>
</div>
<div class="wiz" id="wiz"></div>
<div class="nav" id="nav"></div>
<div class="state" id="state"></div>
<div class="rbar" id="rbar"></div>
<div id="content"></div>
<div id="modal-root"></div>

<script>
const D=typeof INLINE_DATA!=="undefined"?INLINE_DATA:[];

/* mappings */
const T_KR={commute:"출근",interview:"면접",campus:"캠퍼스",date:"데이트",weekend:"주말",travel:"여행",event:"행사",workout:"운동"};
const TN_KR={spring_warm_light:"봄웜 라이트",spring_warm_bright:"봄웜 브라이트",spring_warm_mute:"봄웜 뮤트",summer_cool_light:"여름쿨 라이트",summer_cool_soft:"여름쿨 소프트",summer_cool_mute:"여름쿨 뮤트",autumn_warm_deep:"가을웜 딥",autumn_warm_bright:"가을웜 브라이트",autumn_warm_mute:"가을웜 뮤트",winter_cool_deep:"겨울쿨 딥",winter_cool_bright:"겨울쿨 브라이트",winter_cool_light:"겨울쿨 라이트"};
const S_KR={casual:"캐주얼",formal:"포멀",minimal:"미니멀",feminine:"페미닌",sporty:"스포티"};
const M_KR={minimal:"미니멀",classic:"클래식",casual:"캐주얼",lovely:"러블리",street:"스트릿",editorial:"에디토리얼",dandy:"댄디",amekaji:"아메카지"};
const F_KR={oversized:"오버사이즈",regular:"레귤러핏",slim:"슬림핏"};
const C_KR={mono:"모노톤",neutral:"뉴트럴",pastel:"파스텔",vivid:"비비드"};
const AX={tpo:"TPO",fit:"핏",color:"컬러",style:"스타일"};
const ROLE={"셔츠":"상의","블라우스":"상의","니트":"상의","맨투맨":"상의","후드":"상의","티셔츠":"상의","반팔티":"상의","크롭탑":"상의","자켓":"아우터","코트":"아우터","바람막이":"아우터","패딩":"아우터","가디건":"아우터","슬랙스":"하의","청바지":"하의","반바지":"하의","조거팬츠":"하의","스커트":"하의","레깅스":"하의","트레이닝팬츠":"하의","정장바지":"하의","스니커즈":"신발","로퍼":"신발","힐":"신발","플랫슈즈":"신발","원피스":"원피스","모자":"ACC","넥타이":"ACC"};
const M_BY_G={female:["minimal","classic","casual","lovely","street","editorial"],male:["minimal","classic","casual","dandy","street","amekaji"]};
const TPO_RE={interview:{casual:["minimal","feminine"],street:["minimal"],sporty:["minimal"]},event:{casual:["feminine","minimal"],street:["minimal"]},commute:{sporty:["casual","minimal"],street:["casual"]},workout:{formal:["sporty"],minimal:["sporty","casual"]}};
const S_SIM={casual:["minimal","street"],formal:["minimal","classic"],minimal:["formal","casual"],feminine:["elegant","romantic"],sporty:["casual","street"]};

const STEPS=[
  {key:"gender",title:"성별",opts:[{v:"female",l:"여성"},{v:"male",l:"남성"}]},
  {key:"tone",title:"퍼스널컬러",opts:[]},
  {key:"tpo",title:"TPO",opts:["commute","interview","campus","date","weekend","travel","event","workout"].map(t=>({v:t,l:T_KR[t]}))},
  {key:"mood",title:"분위기",opts:[]},
  {key:"budget",title:"예산",type:"slider"},
  {key:"style",title:"스타일",opts:[{v:"casual",l:"캐주얼"},{v:"formal",l:"포멀"},{v:"minimal",l:"미니멀"},{v:"feminine",l:"페미닌"},{v:"sporty",l:"스포티"}]},
  {key:"genre",title:"장르",opts:[{v:"modern_office",l:"모던오피스"},{v:"vintage",l:"빈티지"},{v:"sporty",l:"스포티"},{v:"classic",l:"클래식"}]},
  {key:"fit",title:"핏",opts:[{v:"oversized",l:"오버사이즈"},{v:"regular",l:"레귤러핏"},{v:"slim",l:"슬림핏"}]},
  {key:"color",title:"컬러",opts:[{v:"mono",l:"모노톤"},{v:"neutral",l:"뉴트럴"},{v:"pastel",l:"파스텔"},{v:"vivid",l:"비비드"}]},
];
const TOTAL=STEPS.length;
let cur=0, mode="app"; // "app" | "list"
let ST={gender:"",tone:"",tpo:"",mood:"",budget:500000,style:"",genre:"",fit:"",color:""};

function init(){
  if(!D.length){document.getElementById("content").innerHTML='<div class="empty">outfits_data.js 로드 실패</div>';return;}
  document.getElementById("ver").textContent=D.length+"개 코디";
  STEPS[1].opts=[...new Set(D.filter(o=>o.tone_id).map(o=>o.tone_id))].sort().map(t=>({v:t,l:TN_KR[t]||t}));
  // mode tabs
  document.getElementById("modes").innerHTML=
    `<div class="mode-tab${mode==="app"?" on":""}" onclick="mode='app';renderAll()">앱 미리보기</div>`+
    `<div class="mode-tab${mode==="list"?" on":""}" onclick="mode='list';renderAll()">리스트</div>`;
  renderAll();
}

async function renderAll(){
  document.getElementById("modes").innerHTML=
    `<div class="mode-tab${mode==="app"?" on":""}" onclick="mode='app';renderAll()">앱 미리보기</div>`+
    `<div class="mode-tab${mode==="list"?" on":""}" onclick="mode='list';renderAll()">리스트</div>`;
  renderWiz();renderNav();renderState();await renderResults();
}

/* wizard */
function renderWiz(){
  const w=document.getElementById("wiz");
  if(STEPS[3].key==="mood"){
    STEPS[3].opts=(ST.gender?M_BY_G[ST.gender]||[]:["minimal","classic","casual","lovely","street","editorial","dandy","amekaji"]).map(m=>({v:m,l:M_KR[m]||m}));
  }
  let h="";
  STEPS.forEach((s,i)=>{
    const done=i<cur,isCur=i===cur;
    const cls=done?"st done":isCur?"st cur":"st";
    const val=ST[s.key];
    const vl=s.type==="slider"?(val>=500000?"전체":"~₩"+(val/1000).toFixed(0)+"K"):(s.opts.find(o=>o.v===val)||{}).l||"";
    h+=`<div class="${cls}${isCur?"":" hidden"}" style="${isCur?"":"display:none"}"><div class="st-h" onclick="cur=${i};renderAll()"><div class="st-n">${i+1}</div><div class="st-t">${s.title}</div>${vl?`<div class="st-v">${vl}</div>`:""}</div>`;
    if(isCur){
      if(s.type==="slider") h+=`<div style="display:flex;align-items:center;gap:6px;margin-top:4px"><input type="range" min="30000" max="500000" step="10000" value="${ST.budget}" style="flex:1;accent-color:var(--ac)" oninput="setSel('budget',+this.value)"><span style="font-size:10px;color:var(--t2);min-width:45px;text-align:right">${ST.budget>=500000?"전체":"~₩"+(ST.budget/1000).toFixed(0)+"K"}</span></div>`;
      else h+=`<div class="cps">${s.opts.map(o=>`<div class="cp${ST[s.key]===o.v?" on":""}" onclick="setSel('${s.key}','${o.v}')">${o.l}</div>`).join("")}</div>`;
    }
    h+=`</div>`;
  });
  // 완료된 단계 요약
  let summary="";
  STEPS.forEach((s,i)=>{
    if(i<cur){
      const val=ST[s.key];
      const vl=s.type==="slider"?(val>=500000?"전체":"~₩"+(val/1000).toFixed(0)+"K"):(s.opts.find(o=>o.v===val)||{}).l||"";
      if(vl) summary+=`<span class="sp" onclick="cur=${i};renderAll()" style="cursor:pointer">${s.title}: ${vl}</span> `;
    }
  });
  w.innerHTML=(summary?`<div style="padding:4px 16px;display:flex;flex-wrap:wrap;gap:3px;font-size:9px;background:var(--sf);border-bottom:1px solid var(--bd)">${summary}</div>`:"")+h;
}
function setSel(k,v){ST[k]=ST[k]===v?"":v;if(k==="gender")ST.mood="";renderAll();}
function renderNav(){
  const n=document.getElementById("nav");
  const isLast=cur>=TOTAL-1;
  n.innerHTML=`<button class="prev" ${cur===0?"disabled":""} onclick="cur=Math.max(0,cur-1);renderAll()">← 이전</button>${isLast?`<button class="see" onclick="cur=TOTAL;renderAll()">결과 보기</button>`:`<button class="next" onclick="cur=Math.min(TOTAL,cur+1);renderAll()">다음 →</button>`}`;
}
function renderState(){
  const el=document.getElementById("state");
  const ps=[];
  if(ST.gender)ps.push(ST.gender==="female"?"여성":"남성");
  if(ST.tone)ps.push(TN_KR[ST.tone]||ST.tone);
  if(ST.tpo)ps.push(T_KR[ST.tpo]);
  if(ST.mood)ps.push(M_KR[ST.mood]||ST.mood);
  if(ST.budget<500000)ps.push("~₩"+(ST.budget/1000).toFixed(0)+"K");
  if(ST.style)ps.push(S_KR[ST.style]||ST.style);
  if(ST.fit)ps.push(F_KR[ST.fit]||ST.fit);
  if(ST.color)ps.push(C_KR[ST.color]||ST.color);
  el.innerHTML=ps.length?ps.map(p=>`<span class="sp">${p}</span>`).join(""):'<span style="color:var(--t3)">선택 없음</span>';
}

/* scoring */
function score(o){
  let sc=0;const rs=[];
  const re=(TPO_RE[ST.tpo]||{})[ST.style]||[],sim=S_SIM[ST.style]||[];
  if(ST.style){if(o.style_tag===ST.style){sc+=6;rs.push("스타일일치")}else if(re.includes(o.style_tag)){sc+=6;rs.push(`TPO재해석→${S_KR[o.style_tag]||o.style_tag}`)}else if(sim.includes(o.style_tag)){sc+=3;rs.push(`유사${S_KR[o.style_tag]||o.style_tag}`)}}
  if(ST.mood&&(o.designed_moods||[]).includes(ST.mood)){sc+=6;rs.push("무드일치")}
  if(ST.fit){const sils=(o.items||[]).map(i=>i.silhouette||"regular");const fm={oversized:["oversized","relaxed"],slim:["slim","fitted"],regular:["regular"]};if(sils.some(s=>(fm[ST.fit]||[]).includes(s))){sc+=2;rs.push("핏일치")}}
  if(ST.color){const hx=(o.items||[]).map(i=>i.color_hex||"").filter(h=>h.length>=7);if(hx.length){let r=0,g=0,b=0;hx.forEach(h=>{r+=parseInt(h.slice(1,3),16);g+=parseInt(h.slice(3,5),16);b+=parseInt(h.slice(5,7),16)});const n=hx.length;r/=n;g/=n;b/=n;const sat=Math.max(r,g,b)-Math.min(r,g,b),br=(r+g+b)/3;let cls="neutral";if(sat<40&&br<100)cls="mono";else if(sat<60)cls="neutral";else if(br>180&&sat<100)cls="pastel";else if(sat>=100)cls="vivid";if(cls===ST.color){sc+=2;rs.push("컬러일치")}}}
  return{sc,rs};
}

// API 캐시
let _apiCache={};
let _apiResults=null;

async function fetchFromAPI(){
  if(!ST.tpo||!ST.gender)return null;
  const key=`${ST.tpo}_${ST.gender}_${ST.tone}_${ST.budget}`;
  if(_apiCache[key])return _apiCache[key];
  try{
    const params=new URLSearchParams({tone_id:ST.tone||"",tpo:ST.tpo,gender:ST.gender,budget_max:String(ST.budget),page_size:"20"});
    const r=await fetch(`http://localhost:8000/api/feed?${params}`);
    if(!r.ok)return null;
    const data=await r.json();
    _apiCache[key]=data.outfits;
    return data.outfits;
  }catch(e){return null;}
}

function _runFromAPI(){
  if(!_apiResults||!_apiResults.length)return null;
  var hs=ST.style||ST.mood||ST.fit||ST.color;
  var sc2=_apiResults.map(function(o){var s=score(o);return{o:o,sc:s.sc,rs:s.rs,appRank:0}});
  var mt=sc2.filter(function(r){return r.sc>0});
  var res=hs&&mt.length?mt:sc2;
  return{hard:_apiResults.length,total:sc2.length,matched:mt.length,hasSoft:hs,results:res,fallback:hs&&!mt.length,source:"API"};
}

function run(){
  var apiRun=_runFromAPI();
  if(apiRun)return apiRun;

  var all=D.filter(function(o){return o.scores&&(o.scores.final||o.scores.total)});
  var hard=all.filter(function(o){
    if(ST.tpo&&!(o.designed_tpo||[]).map(function(t){return t.toLowerCase()}).includes(ST.tpo))return false;
    if(ST.gender&&o.gender!==ST.gender)return false;
    if(ST.tone){var us=ST.tone.split("_").slice(0,2).join("_");var os=(o.tone_id||"").split("_").slice(0,2).join("_");if(o.tone_id!==ST.tone&&os!==us)return false;}
    if(ST.budget<500000&&(o.total_price||o.price_total||0)>ST.budget*1.5)return false;
    return true;
  });
  var hs=ST.style||ST.mood||ST.fit||ST.color;
  var sc2=hard.map(function(o){var s=score(o);return{o:o,sc:s.sc,rs:s.rs,appRank:0}}).sort(function(a,b){return b.sc!==a.sc?b.sc-a.sc:(b.o.scores&&b.o.scores.final||b.o.scores&&b.o.scores.total||0)-(a.o.scores&&a.o.scores.final||a.o.scores&&a.o.scores.total||0)});
  var mt=sc2.filter(function(r){return r.sc>0});
  var results=hs&&mt.length?mt:sc2;
  // diversity
  if(results.length>3){
    const picks=[results[0]];const usedSt=new Set([results[0].o.style_tag]);
    const pool=results.slice(1);
    const p2=pool.find(r=>!usedSt.has(r.o.style_tag))||pool[0];
    if(p2){picks.push(p2);usedSt.add(p2.o.style_tag);}
    const rem=pool.filter(r=>!picks.includes(r));
    const p3=rem.find(r=>!usedSt.has(r.o.style_tag))||rem[0];
    if(p3)picks.push(p3);
    const rest=rem.filter(r=>!picks.includes(r));
    results=[...picks,...rest];
  }
  return{hard:hard.length,total:scored.length,matched:matched.length,hasSoft,results,fallback:hasSoft&&!matched.length,source:"LOCAL"};
}

/* render */
async function renderResults(){
  if(cur<TOTAL){document.getElementById("rbar").innerHTML="";document.getElementById("content").innerHTML="";return;}
  // API 호출 시도 (백엔드 실행 중이면 앱과 동일 결과)
  _apiResults=null;
  if(ST.tpo&&ST.gender){
    const apiData=await fetchFromAPI();
    if(apiData&&apiData.length){
      // API 결과를 로컬 데이터 형식으로 변환 (items에 silhouette 등 추가)
      _apiResults=apiData.map(ao=>{
        // 로컬 데이터에서 outfit_id 매칭하여 누락 필드 보충
        const local=D.find(d=>d.outfit_id===ao.outfit_id);
        const items=ao.items.map((ai,idx)=>{
          const li=local&&local.items[idx]?local.items[idx]:{};
          return{...ai,silhouette:ai.silhouette||li.silhouette||"regular"};
        });
        return{...ao,items,designed_tpo:local?.designed_tpo||ao.tags?.filter(t=>T_KR[t])||[],designed_moods:local?.designed_moods||[],style_tag:local?.style_tag||items[0]?.style_tag||"",formality_avg:local?.formality_avg||0};
      });
    }
  }
  const r=run();
  const bar=document.getElementById("rbar");
  const srcBadge=r.source==="API"?`<span style="background:#4F97A3;color:#fff;padding:1px 6px;border-radius:4px;font-size:9px;margin-left:4px">앱 API 동기화</span>`:`<span style="background:var(--wn);color:#fff;padding:1px 6px;border-radius:4px;font-size:9px;margin-left:4px">로컬 데이터</span>`;
  if(!r.total){bar.innerHTML='<b>0건</b>'+srcBadge;document.getElementById("content").innerHTML='<div class="empty">결과 없음</div>';return;}
  if(r.fallback)bar.innerHTML=`<span class="wn">⚠ 정확 매칭 없음 — 전체 ${r.total}건</span>`+srcBadge;
  else if(r.hasSoft)bar.innerHTML=`매칭 <b>${r.matched}건</b> / 전체 ${r.total}건`+srcBadge;
  else bar.innerHTML=`결과 <b>${r.total}건</b>`+srcBadge;

  if(mode==="app") renderAppPreview(r);
  else renderList(r);
}

/* ═══ APP PREVIEW MODE ═══ */
function renderAppPreview(r){
  const top1=r.results[0];if(!top1){document.getElementById("content").innerHTML='<div class="empty">결과 없음</div>';return;}
  const o=top1.o,sc=o.scores||{},items=o.items||[];
  const heroItem=items[0]||{};
  const totalPrice=items.reduce((s,i)=>s+(i.price||0),0);
  const tpo=T_KR[ST.tpo]||"일상";
  const confidence=Math.min(99,Math.round(((sc.final||sc.total||0)/100*50)+(top1.sc/16*30)+((sc.tpo||sc.of||0)/100*20)));

  let h=`<div class="app-preview">`;
  // header
  h+=`<div class="ap-header"><h2>오늘의 결정</h2><p>${ST.style?`${S_KR[ST.style]||ST.style} 취향 기반 추천`:`${tpo} 상황에 맞춘 코디`}</p></div>`;
  // hero card
  h+=`<div class="ap-card"><div class="ap-overlay">`;
  h+=heroItem.image_url?`<img class="ap-hero" src="${heroItem.image_url}" referrerpolicy="no-referrer" loading="lazy" onerror="this.outerHTML='<div class=no-img>이미지 오류</div>'">`:'<div class="no-img">이미지 없음</div>';
  h+=`<div class="ov"><h3>${o.style_tag?S_KR[o.style_tag]||o.style_tag:""} ${tpo} 코디</h3><div class="price">₩${totalPrice.toLocaleString()}<small>총 ${items.length}pcs 합산</small></div></div></div>`;
  // items
  h+=`<div class="ap-items"><h4>아이템 구성 ${items.length}pcs <span style="float:right;font-weight:400;color:var(--t3);font-size:9px">탭하여 상세보기</span></h4>`;
  items.forEach((it,i)=>{
    const role=ROLE[it.category]||"";
    const pct=totalPrice>0?Math.round((it.price||0)/totalPrice*100):0;
    h+=`<div class="ap-item" onclick="openModal(${JSON.stringify(r.results[0].o.outfit_id).replace(/"/g,"&quot;")},${i})">
      <img src="${it.image_url||''}" referrerpolicy="no-referrer" loading="lazy" onerror="this.style.display='none'">
      <div class="info"><div>${role?`<span class="role">${role}</span>`:""}<span class="cat">${it.category||"?"}</span></div><div class="brand">${it.brand||it.name||""}</div></div>
      <div class="pr">₩${(it.price||0).toLocaleString()}<div style="font-size:8px;color:var(--t3);font-weight:400">${pct}%</div></div>
    </div>`;
  });
  h+=`<div style="text-align:right;font-size:10px;color:var(--t2);margin-top:4px;padding-top:4px;border-top:1px solid var(--bd)">합산 <b style="color:var(--ac)">₩${totalPrice.toLocaleString()}</b></div></div>`;
  // reason
  h+=`<div class="ap-reason"><div class="core">💬 ${o.style_tag?S_KR[o.style_tag]:"추천"} 스타일의 ${tpo} 코디 — 신뢰도 <b>${confidence}%</b></div>`;
  if(sc.tpo>=80)h+=`<div class="guard" style="margin-top:4px">📌 TPO 적합도 ${(sc.tpo||0).toFixed(0)}점</div>`;
  h+=`<div class="guard">🛡 아이템 간 스타일이 일관되어 실패 가능성이 낮아요</div>`;
  h+=`<div class="situ">📍 ${T_KR[ST.tpo]?({interview:"채용 면접, 인턴 면접",commute:"평일 출근, 미팅",date:"저녁 데이트, 카페",weekend:"친구 약속, 쇼핑",campus:"수업, 도서관",event:"결혼식, 파티",travel:"국내·해외 여행",workout:"헬스장, 러닝"})[ST.tpo]||"일상":"일상"}</div></div>`;

  // QA panel
  h+=`<details class="qa-panel"><summary>QA 상세 정보</summary><div class="qb"><table>
    <tr><td>outfit_id</td><td>${o.outfit_id}</td></tr>
    <tr><td>tone_id</td><td>${o.tone_id||"-"}</td></tr>
    <tr><td>style_tag</td><td>${o.style_tag||"-"}</td></tr>
    <tr><td>designed_tpo</td><td>${(o.designed_tpo||[]).join(", ")}</td></tr>
    <tr><td>designed_moods</td><td>${(o.designed_moods||[]).join(", ")}</td></tr>
    <tr><td>formality_avg</td><td>${(o.formality_avg||0).toFixed(1)}</td></tr>
    <tr><td>hero_item</td><td>${heroItem.category||"?"} (items[0])</td></tr>
    <tr><td colspan="2" style="font-weight:600;padding-top:4px">v2 Scores</td></tr>
    <tr><td>tpo</td><td>${(sc.tpo||0).toFixed(1)}</td></tr>
    <tr><td>fit</td><td>${(sc.fit||0).toFixed(1)}</td></tr>
    <tr><td>color</td><td>${(sc.color||0).toFixed(1)}</td></tr>
    <tr><td>style</td><td>${(sc.style||0).toFixed(1)}</td></tr>
    <tr><td>risk</td><td>${(sc.risk||0).toFixed(1)}</td></tr>
    <tr><td>final</td><td><b>${(sc.final||sc.total||0).toFixed(1)}</b></td></tr>
    <tr><td colspan="2" style="font-weight:600;padding-top:4px">Soft Scoring</td></tr>
    <tr><td>매칭점수</td><td>${top1.sc}점</td></tr>
    <tr><td>적용규칙</td><td>${top1.rs.join(", ")||"없음"}</td></tr>
    <tr><td colspan="2" style="font-weight:600;padding-top:4px">조건 매핑</td></tr>
    <tr><td>season_tone</td><td>${ST.tone||"-"}</td></tr>
    <tr><td>tpo</td><td>${ST.tpo||"-"}</td></tr>
    <tr><td>mood</td><td>${ST.mood||"-"}</td></tr>
    <tr><td>style</td><td>${ST.style||"-"}</td></tr>
    <tr><td>fit</td><td>${ST.fit||"-"}</td></tr>
    <tr><td>color_scheme</td><td>${ST.color||"-"}</td></tr>
  </table></div></details>`;

  h+=`</div></div>`;
  // CTA
  h+=`<div class="ap-cta"><button>이 코디로 결정</button><button class="explore" onclick="mode='list';renderAll()">비슷한 선택 보기 (${r.results.length}건)</button></div>`;

  document.getElementById("content").innerHTML=h;
}

/* modal */
function openModal(outfitId,itemIdx){
  const outfit=run().results.find(r=>r.o.outfit_id===outfitId);
  if(!outfit)return;
  const o=outfit.o,it=o.items[itemIdx];if(!it)return;
  const totalPrice=(o.items||[]).reduce((s,i)=>s+(i.price||0),0);
  const role=ROLE[it.category]||"";
  const pct=totalPrice>0?Math.round((it.price||0)/totalPrice*100):0;
  const isValid=it.mall_url&&it.mall_url.startsWith("http");

  const el=document.getElementById("modal-root");
  el.innerHTML=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div class="bar"></div><div class="mb">
      <div class="mi">
        <img src="${it.image_url||''}" referrerpolicy="no-referrer" onerror="this.style.display='none'">
        <div class="det">
          <div>${role?`<span style="font-size:9px;font-weight:600;color:var(--ac);background:rgba(150,79,76,.08);padding:1px 5px;border-radius:3px">${role}</span>`:""}<span style="font-size:11px;color:var(--t2);margin-left:4px">${it.category||""}</span></div>
          <h3>${it.name||it.category||"상품"}</h3>
          ${it.brand?`<div style="font-size:11px;color:var(--t2)">${it.brand}</div>`:""}
          ${it.price?`<div class="pr">₩${it.price.toLocaleString()}</div>`:""}
        </div>
      </div>
      <div class="ctx">
        이 코디에서 <b style="color:var(--tx)">${role||it.category}</b> 역할 · 전체 가격의 <b style="color:var(--ac)">${pct}%</b><br>
        ${it.style_tag?`스타일: ${S_KR[it.style_tag]||it.style_tag}`:""} ${it.formality?`· 격식도 ${it.formality}`:""} ${it.silhouette?`· 핏 ${F_KR[it.silhouette]||it.silhouette}`:""}
      </div>
      <div class="btns">
        <button class="close" onclick="closeModal()">닫기</button>
        ${isValid?`<a class="cta" href="${it.mall_url}" target="_blank" rel="noopener">상품 보러가기 →</a>`:`<button class="cta" disabled style="opacity:.4">링크 없음</button>`}
      </div>
      <div class="qa-detail"><h5>QA Item Detail</h5><table>
        <tr><td>product_id</td><td>${it.product_id||"-"}</td></tr>
        <tr><td>item_index</td><td>${itemIdx}</td></tr>
        <tr><td>role_in_outfit</td><td>${role||"-"}</td></tr>
        <tr><td>contribution%</td><td>${pct}%</td></tr>
        <tr><td>category</td><td>${it.category||"-"}</td></tr>
        <tr><td>brand</td><td>${it.brand||"-"}</td></tr>
        <tr><td>price</td><td>₩${(it.price||0).toLocaleString()}</td></tr>
        <tr><td>style_tag</td><td>${it.style_tag||"-"}</td></tr>
        <tr><td>formality</td><td>${it.formality||"-"}</td></tr>
        <tr><td>silhouette</td><td>${it.silhouette||"-"}</td></tr>
        <tr><td>tone_id</td><td>${it.tone_id||"-"}</td></tr>
        <tr><td>color_hex</td><td>${it.color_hex||"-"}</td></tr>
        <tr><td>cta_target</td><td style="word-break:break-all">${it.mall_url||"없음"}</td></tr>
        <tr><td>cta_valid</td><td style="color:${isValid?"var(--ok)":"var(--ac)"}">${isValid?"유효":"무효/없음"}</td></tr>
      </table></div>
    </div>
  </div></div>`;
}
function closeModal(){document.getElementById("modal-root").innerHTML="";}

/* ═══ LIST MODE ═══ */
function renderList(r){
  const show=r.results.slice(0,20);
  let h=`<div class="grid">`;
  show.forEach(({o,sc,rs},i)=>{
    const s=o.scores||{};const img=(o.items||[]).find(i=>i.image_url);
    h+=`<div class="cd" onclick="mode='app';renderAll()" style="cursor:pointer">
      ${img?`<img class="cd-img" src="${img.image_url}" referrerpolicy="no-referrer" loading="lazy" onerror="this.outerHTML='<div class=no-img>ERR</div>'">`:'<div class="no-img">이미지없음</div>'}
      <div class="cd-b">
        <div class="pills"><span class="pl pl-t">#${i+1}</span>${(o.designed_tpo||[]).map(t=>`<span class="pl pl-t">${T_KR[t.toLowerCase()]||t}</span>`).join("")}<span class="pl pl-g">${o.gender==="female"?"여성":"남성"}</span><span class="pl pl-s">${S_KR[o.style_tag]||o.style_tag||"?"}</span><span class="pl pl-p">${((o.total_price||o.price_total||0)/1000).toFixed(0)}K</span></div>
        <div style="font-size:9px;color:var(--t2)">final <b style="color:var(--ac)">${(s.final||s.total||0).toFixed(1)}</b> | 매칭 ${sc}점${rs.length?` · ${rs[0]}`:""}</div>
      </div></div>`;
  });
  h+=`</div>`;
  document.getElementById("content").innerHTML=h;
}

init();
</script>
